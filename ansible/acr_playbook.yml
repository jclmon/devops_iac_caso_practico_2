---
# Playbook to manage ACR images
# Usage: ansible-playbook -i inventory acr_playbook.yml

- name: Manage Azure Container Registry Images
  hosts: acr
  gather_facts: true
  become: yes
  become_method: sudo
  vars:
    # Images to push to ACR with folder organization
    public_images:
      - image: "docker.io/bitnami/redis:latest"
        folder: "databases"
        tag_version: "casopractico2"
      - image: "docker.io/suhuruli/azure-vote-front:latest"
        folder: "frontend"
        tag_version: "casopractico2"

  roles:
    - acr

  pre_tasks:
    - name: Display ACR info
      debug:
        msg: |
          ACR Configuration:
          - Server: {{ acr_login_server }}
          - Name: {{ acr_name }}
          - Username: {{ acr_username }}
      tags:
        - always

  post_tasks:
    - name: Verify images in ACR
      debug:
        msg: "Images have been successfully pushed to {{ acr_login_server }}"
      tags:
        - always
