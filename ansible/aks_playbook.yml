---
# Playbook to deploy application on AKS
# Usage: ansible-playbook -i inventory aks_playbook.yml

- name: Deploy Application on Azure Kubernetes Service
  hosts: aks
  gather_facts: false

  vars:
    # Override these values for your deployment
    namespace: "casopractico2"
    deployment_name: "app-deployment"
    app_name: "cats-vs-dogs"
    replicas: 2
    container_port: 80
    service_port: 80
    pvc_size: "10Gi"
    cpu_request: "100m"
    memory_request: "128Mi"
    cpu_limit: "500m"
    memory_limit: "512Mi"
    # Container images from ACR with folder organization
    container_image: "{{ acr_login_server }}/frontend/azure-vote-front:casopractico2"
    redis_image: "{{ acr_login_server }}/databases/redis:casopractico2"

  pre_tasks:
    - name: Display AKS deployment configuration
      debug:
        msg: |
          AKS Deployment Configuration:
          - Cluster: {{ aks_cluster_name }}
          - Resource Group: {{ resource_group_name }}
          - Namespace: {{ namespace }}
          - Container Image: {{ container_image }}
          - Replicas: {{ replicas }}
          - PVC Size: {{ pvc_size }}
      tags:
        - always

    - name: Verify required variables
      assert:
        that:
          - resource_group_name is defined and resource_group_name != ''
          - aks_cluster_name is defined and aks_cluster_name != ''
          - acr_login_server is defined and acr_login_server != ''
          - container_image is defined and container_image != ''
        fail_msg: "Required variables are missing"
      tags:
        - always

  roles:
    - aks

  post_tasks:
    - name: Wait for pods to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_sleep: 10
        wait_timeout: 300
      ignore_errors: true
      tags:
        - always

    - name: Get application access information
      kubernetes.core.k8s_info:
        kind: Service
        name: "{{ service_name }}"
        namespace: "{{ namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"
      register: service_info
      tags:
        - always

    - name: Extract external IP from service
      set_fact:
        external_ip: "{{ service_info.resources[0].status.loadBalancer.ingress[0].ip | default('Pending') }}"
      when: service_info.resources | length > 0
      tags:
        - always

    - name: Set app access info message
      set_fact:
        app_access_info:
          stdout: |
            {% if external_ip != 'Pending' %}
            Application accessible at: http://{{ external_ip }}:{{ service_port }}
            {% else %}
            External IP is still pending. Wait a few moments and check with:
            kubectl get service {{ service_name }} -n {{ namespace }}
            {% endif %}
      tags:
        - always

    - name: Display application access information
      debug:
        msg: "{{ app_access_info.stdout }}"
      tags:
        - always

    - name: Get pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app={{ app_name }}
        kubeconfig: "{{ kubeconfig_path }}"
      register: pod_status
      tags:
        - always

    - name: Display pod status
      debug:
        msg: |
          Pod Status:
          {% if pod_status.resources | length > 0 %}
          {% for pod in pod_status.resources %}
          - Name: {{ pod.metadata.name }}
            Namespace: {{ pod.metadata.namespace }}
            Status: {{ pod.status.phase | default('Unknown') }}
            Ready: {{ (pod.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first) | default('Unknown') }}
          {% endfor %}
          {% else %}
          No pods found
          {% endif %}
      tags:
        - always
