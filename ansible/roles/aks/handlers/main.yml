---
# Handlers for AKS role

- name: Restart deployment
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
      spec:
        template:
          metadata:
            annotations:
              restartedAt: "{{ ansible_date_time.iso8601 }}"
    kubeconfig: "{{ kubeconfig_path }}"
  listen: "restart_deployment"

- name: Delete deployment
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  listen: "delete_deployment"
