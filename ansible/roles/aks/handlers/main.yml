---
# Handlers for AKS role

- name: Restart deployment
  shell: |
    kubectl rollout restart deployment/{{ deployment_name }} -n {{ namespace }} \
      --kubeconfig={{ kubeconfig_path }}
  listen: "restart_deployment"

- name: Delete deployment
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  listen: "delete_deployment"
