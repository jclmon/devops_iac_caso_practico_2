---
# AKS Role - Deploy application on Azure Kubernetes Service

# Get kubeconfig credentials
- name: Get AKS kubeconfig
  ansible.builtin.debug:
    msg: "Using kubeconfig from: {{ kubeconfig_path }}"
  tags:
    - setup_kubeconfig

- name: Verify kubeconfig exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_path }}"
  register: kubeconfig_stat
  tags:
    - setup_kubeconfig

- name: Fail if kubeconfig not found
  ansible.builtin.fail:
    msg: "kubeconfig not found at {{ kubeconfig_path }}. Please ensure AKS credentials are configured."
  when: not kubeconfig_stat.stat.exists
  tags:
    - setup_kubeconfig

# Create namespace
- name: Create Kubernetes namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_namespace

# Create ACR secret for authentication
- name: Create ACR image pull secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ acr_secret_name }}"
        namespace: "{{ namespace }}"
      type: kubernetes.io/dockercfg
      data:
        .dockercfg: '{{ (''{"'' + acr_login_server + ''": {"auth": "'' + (acr_username + '':'' + acr_password) | b64encode + ''", "email": "admin@example.com"}}'') | b64encode }}'
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_acr_secret

# Create Persistent Volume Claim
- name: Create Persistent Volume Claim
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ pvc_name }}"
        namespace: "{{ namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ pvc_size }}"
        storageClassName: "{{ storage_class }}"
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_pvc

# Create ConfigMap for application configuration
- name: Create ConfigMap for app configuration
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ app_config_name }}"
        namespace: "{{ namespace }}"
      data:
        APP_NAME: "{{ app_name }}"
        ENVIRONMENT: "{{ app_environment }}"
        LOG_LEVEL: "{{ log_level }}"
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_configmap

# Create Redis Deployment
- name: Create Redis Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "redis-deployment"
        namespace: "{{ namespace }}"
        labels:
          app: "redis"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: "redis"
        template:
          metadata:
            labels:
              app: "redis"
          spec:
            imagePullSecrets:
              - name: "{{ acr_secret_name }}"
            containers:
              - name: "redis"
                image: "{{ redis_image }}"
                imagePullPolicy: Always
                ports:
                  - containerPort: 6379
                    name: redis
                env:
                  - name: ALLOW_EMPTY_PASSWORD
                    value: "yes"
                resources:
                  requests:
                    memory: "{{ redis_memory_request }}"
                    cpu: "{{ redis_cpu_request }}"
                  limits:
                    memory: "{{ redis_memory_limit }}"
                    cpu: "{{ redis_cpu_limit }}"
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_redis_deployment

# Create Redis Service
- name: Create Redis Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "redis-service"
        namespace: "{{ namespace }}"
        labels:
          app: "redis"
      spec:
        type: ClusterIP
        selector:
          app: "redis"
        ports:
          - protocol: TCP
            port: 6379
            targetPort: 6379
            name: redis
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_redis_service

# Create Kubernetes Deployment
- name: Create Kubernetes Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        labels:
          app: "{{ app_name }}"
      spec:
        replicas: "{{ replicas }}"
        selector:
          matchLabels:
            app: "{{ app_name }}"
        template:
          metadata:
            labels:
              app: "{{ app_name }}"
          spec:
            imagePullSecrets:
              - name: "{{ acr_secret_name }}"
            containers:
              - name: "{{ container_name }}"
                image: "{{ container_image }}"
                imagePullPolicy: Always
                ports:
                  - containerPort: "{{ container_port }}"
                    name: http
                env:
                  - name: REDIS
                    value: "redis-service"
                volumeMounts:
                  - name: data
                    mountPath: "{{ container_mount_path }}"
                resources:
                  requests:
                    memory: "{{ app_memory_request }}"
                    cpu: "{{ app_cpu_request }}"
                  limits:
                    memory: "{{ app_memory_limit }}"
                    cpu: "{{ app_cpu_limit }}"
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: "{{ pvc_name }}"
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_deployment

# Create LoadBalancer Service
- name: Create LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ service_name }}"
        namespace: "{{ namespace }}"
        labels:
          app: "{{ app_name }}"
      spec:
        type: LoadBalancer
        selector:
          app: "{{ app_name }}"
        ports:
          - protocol: TCP
            port: "{{ service_port }}"
            targetPort: "{{ container_port }}"
            name: http
        sessionAffinity: None
    kubeconfig: "{{ kubeconfig_path }}"
  tags:
    - create_service

# Wait for LoadBalancer to get External IP
- name: Wait for LoadBalancer External IP
  kubernetes.core.k8s_info:
    kind: Service
    name: "{{ service_name }}"
    namespace: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: service_info
  until: service_info.resources[0].status.loadBalancer.ingress is defined
  retries: 30
  delay: 10
  tags:
    - wait_for_lb

# Display deployment information
- name: Get deployment status
  kubernetes.core.k8s_info:
    kind: Deployment
    name: "{{ deployment_name }}"
    namespace: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: deployment_info
  tags:
    - always

- name: Format deployment status for display
  set_fact:
    deployment_status:
      stdout: |
        NAME                 READY   UP-TO-DATE   AVAILABLE   AGE
        {{ deployment_info.resources[0].metadata.name | default('N/A') }}   
        {{ (deployment_info.resources[0].status.readyReplicas | default(0)) }}/{{ (deployment_info.resources[0].status.replicas | default(0)) }}   
        {{ deployment_info.resources[0].status.updatedReplicas | default(0) }}          
        {{ deployment_info.resources[0].status.availableReplicas | default(0) }}         
        {{ deployment_info.resources[0].metadata.creationTimestamp | default('N/A') }}
  when: deployment_info.resources | length > 0
  tags:
    - always

- name: Get service information
  kubernetes.core.k8s_info:
    kind: Service
    name: "{{ service_name }}"
    namespace: "{{ namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: service_detail
  tags:
    - always

- name: Format service status for display
  set_fact:
    service_status:
      stdout: |
        NAME         TYPE           CLUSTER-IP    EXTERNAL-IP       PORT(S)
        {{ service_detail.resources[0].metadata.name | default('N/A') }}   
        {{ service_detail.resources[0].spec.type | default('N/A') }}           
        {{ service_detail.resources[0].spec.clusterIP | default('N/A') }}   
        {{ service_detail.resources[0].status.loadBalancer.ingress[0].ip | default('<pending>') }}   
        {{ service_detail.resources[0].spec.ports[0].port }}/TCP
  when: service_detail.resources | length > 0
  tags:
    - always

- name: Display AKS deployment information
  debug:
    msg: |
      ✓ AKS Deployment Complete!

      Namespace: {{ namespace }}
      Deployment: {{ deployment_name }}
      Service: {{ service_name }}

      Deployment Status:
      {{ deployment_status.stdout }}

      Service Status:
      {{ service_status.stdout }}

      External IP: {{ service_info.resources[0].status.loadBalancer.ingress[0].ip if service_info.resources[0].status.loadBalancer.ingress is defined else 'Pending' }}
  tags:
    - always
